# 敏感信息 Secret 模板
# ⚠️ 部署前请替换为真实值，或用命令生成：
#   kubectl create secret generic zentrix-secrets \
#     --namespace default \
#     --from-literal=jwt-secret="$(openssl rand -base64 48)" \
#     --from-literal=owner-password="你的强密码"
#
# 注意：本文件提交到仓库时仅含占位符，切勿写入真实密钥。
apiVersion: v1
kind: Secret
metadata:
  name: zentrix-secrets
  namespace: default
type: Opaque
stringData:
  # JWT 签名密钥：请用 `openssl rand -base64 48` 生成，长度越长越安全
  jwt-secret: "CHANGE_ME_USE_OPENSSL_RAND_BASE64_48"
  # 所有者账号初始密码（首次登录后请立即在应用内修改，或改由 Secret 注入）
  owner-password: "owner123456"
