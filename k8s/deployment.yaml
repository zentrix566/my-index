apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentrix-lab
  namespace: default
  labels:
    app: zentrix-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zentrix-lab
  template:
    metadata:
      labels:
        app: zentrix-lab
    spec:
      containers:
        - name: web
          image: crpi-nfo20s3jyve6dt2s.cn-beijing.personal.cr.aliyuncs.com/zentrix-repo/devops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "80"
            - name: LOG_DIR
              value: /app/logs
          volumeMounts:
            - name: access-logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: access-logs
          hostPath:
            path: /data/zentrix/logs
            type: DirectoryOrCreate
