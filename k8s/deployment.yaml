apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentrix-lab
  namespace: default
  labels:
    app: zentrix
spec:
  replicas: 1
  revisionHistoryLimit: 10
  minReadySeconds: 5
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app: zentrix
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # 发布期间旧 Pod 必须保持可用，新 Pod Ready 后才允许退出。
      maxUnavailable: 0
      # 常态仍为单副本，发布时最多临时增加一个 Pod。
      maxSurge: 1
  template:
    metadata:
      labels:
        app: zentrix
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: lab-container
          image: crpi-nfo20s3jyve6dt2s.cn-beijing.personal.cr.aliyuncs.com/zentrix-repo/devops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "80"
            # 启动自动种子（所有者账号 + 示例进度），设为 "false" 可关闭
            - name: SEED_ON_STARTUP
              value: "true"
            - name: OWNER_USERNAME
              value: "owner"
            # 敏感信息来自 Secret（见 secret.yaml）
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: jwt-secret
            - name: OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: owner-password
            # ========== PostgreSQL 连接（数据层已从 SQLite 迁移到 PG）==========
            # 非敏感参数明文注入；密码来自 Secret（见 secret.yaml 的 pg-pass）
            - name: PG_HOST
              value: "39.106.136.18"
            - name: PG_USER
              value: "postgres"
            - name: PG_DATABASE
              value: "zentrix"
            - name: PG_PORT
              value: "5432"
            # PG 跑在 docker 内，通常未开启 SSL，设为 "false"；若你的 PG 强制 SSL 改为 "require"
            - name: PG_SSL
              value: "false"
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: pg-pass
          resources: {}
          # 数据层已迁移到 PostgreSQL（外部托管），不再有单文件数据库共享限制。
          # 常态保持 replicas:1；滚动发布时两个 Pod 会短暂重叠。
          lifecycle:
            preStop:
              exec:
                # 给 Service/Ingress 留出摘除旧 Endpoint 的传播时间。
                command: ["/bin/sh", "-c", "sleep 5"]
          startupProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 45
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - mountPath: /app/logs
              name: access-logs
      imagePullSecrets:
        - name: aliyun-registry-secret
      volumes:
        - name: access-logs
          hostPath:
            path: /data/zentrix/logs
            type: DirectoryOrCreate
