apiVersion: apps/v1
kind: Deployment
metadata:
  name: zentrix-lab
  namespace: default
  labels:
    app: zentrix
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: zentrix
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zentrix
    spec:
      containers:
        - name: lab-container
          image: crpi-nfo20s3jyve6dt2s.cn-beijing.personal.cr.aliyuncs.com/zentrix-repo/devops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "80"
            # 启动自动种子（所有者账号 + 示例进度），设为 "false" 可关闭
            - name: SEED_ON_STARTUP
              value: "true"
            - name: OWNER_USERNAME
              value: "owner"
            # 敏感信息来自 Secret（见 secret.yaml）
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: jwt-secret
            - name: OWNER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: owner-password
            # ========== PostgreSQL 连接（数据层已从 SQLite 迁移到 PG）==========
            # 非敏感参数明文注入；密码来自 Secret（见 secret.yaml 的 pg-pass）
            - name: PG_HOST
              value: "39.106.136.18"
            - name: PG_USER
              value: "postgres"
            - name: PG_DATABASE
              value: "zentrix"
            - name: PG_PORT
              value: "5432"
            # PG 跑在 docker 内，通常未开启 SSL，设为 "false"；若你的 PG 强制 SSL 改为 "require"
            - name: PG_SSL
              value: "false"
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: zentrix-secrets
                  key: pg-pass
          resources: {}
          # 数据层已迁移到 PostgreSQL（外部托管），不再有单文件数据库共享限制。
          # 此处 replicas:1 仅为让访问日志（hostPath 单节点写入）保持单写者；
          # 若后续日志改存 PG/对象存储，可安全扩到多副本。
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - mountPath: /app/logs
              name: access-logs
      imagePullSecrets:
        - name: aliyun-registry-secret
      volumes:
        - name: access-logs
          hostPath:
            path: /data/zentrix/logs
            type: DirectoryOrCreate
