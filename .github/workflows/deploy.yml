name: Docker Build and Standard Deploy

on:
  push:
    branches: [ "main" ]  # 只要 main 分支有提交就触发
  workflow_dispatch:      # 同时保留手动触发按钮

env:
  REGISTRY: ghcr.io
  # 阿里云镜像地址 (请替换为你的实际命名空间)
  ALIYUN_REGISTRY: crpi-nfo20s3jyve6dt2s.cn-beijing.personal.cr.aliyuncs.com
  ALIYUN_REPO: zentrix-repo/devops
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 缓存 Git LFS 对象目录，避免每次部署都从 LFS 存储重新下载 93MB 真实图片。
      # 首次构建会种下缓存，之后 git lfs fetch 命中缓存不再重复下载（省 LFS 带宽配额、提速）。
      - name: Cache Git LFS objects
        uses: actions/cache@v4
        with:
          path: ~/.cache/git-lfs
          key: lfs-cache-${{ runner.os }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
        with:
          lfs: true   # 必须拉取 Git LFS 真实文件，否则 public/hearthstone-cards 下是 LFS 指针文本，打包进镜像后图片无法显示

      # 1. 登录到 GitHub 镜像仓库 (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 登录到 阿里云镜像服务 (ACR)
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          # 在 GitHub Settings -> Secrets -> Actions 中配置以下三个变量
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 3. 构建镜像并同时推送到两个仓库
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同时指定两个仓库的标签
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_REPO }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 4. 通过 SSH 登录服务器并通知 K3s 重启 Pod
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |            
            # 1. 触发重启 (确保服务器已经配置了拉取阿里云镜像的凭证)
            kubectl rollout restart deployment zentrix-lab
            
            # 2. 检查状态
            kubectl rollout status deployment zentrix-lab --timeout=5m
