name: Docker Build and Standard Deploy

on:
  push:
    branches: [ "main" ]  # 只要 main 分支有提交就触发
  workflow_dispatch:      # 同时保留手动触发按钮

env:
  REGISTRY: ghcr.io
  # 阿里云镜像地址 (请替换为你的实际命名空间)
  ALIYUN_REGISTRY: crpi-nfo20s3jyve6dt2s.cn-beijing.personal.cr.aliyuncs.com
  ALIYUN_REPO: zentrix-repo/devops
  IMAGE_NAME: ${{ github.repository }}
  # 炉石卡牌图 OSS 基地址（公开读，非密钥）。需在本仓库 Settings → Secrets → Actions 配置 VITE_OSS_BASE，
  # 如 https://<bucket>.oss-cn-beijing.aliyuncs.com （不带结尾斜杠）。CI 构建时注入，前端据此从 OSS 加载图。
  VITE_OSS_BASE: ${{ secrets.VITE_OSS_BASE }}
  # 服务端反向代理的真实 OSS 源站（公开读，非密钥）。server/index.js 把 /hearthstone-cards/* 代理到这里，
  # 让图片以本站域名开头并强制 Content-Disposition: inline（右键新标签直接查看）。
  # 复用已有的 VITE_OSS_BASE secret（其值即 OSS 源站地址，昨天已配置），无需新建 secret。
  OSS_ORIGIN: ${{ secrets.VITE_OSS_BASE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 卡牌图已迁移到阿里云 OSS（前端 VITE_OSS_BASE），不再依赖 Git LFS，
      # 因此 checkout 不拉 LFS，省去拉取 93MB 指针/真实文件与校验步骤，构建更快更稳。
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      # 1. 登录到 GitHub 镜像仓库 (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 登录到 阿里云镜像服务 (ACR)
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          # 在 GitHub Settings -> Secrets -> Actions 中配置以下三个变量
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      # 启用 Docker Buildx（使用 docker-container 驱动，支持 gha 缓存导出）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 构建镜像并同时推送到两个仓库（启用 Docker 层缓存加速构建）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 将 VITE_OSS_BASE / OSS_ORIGIN 传进 Docker 构建容器：
          # VITE_OSS_BASE 供 vite build 编译进产物；OSS_ORIGIN 供服务端运行时反向代理 /hearthstone-cards/*。
          build-args: |
            VITE_OSS_BASE=${{ env.VITE_OSS_BASE }}
            OSS_ORIGIN=${{ env.OSS_ORIGIN }}
          # 同时指定两个仓库的标签。
          # 关键：除 :latest 外，额外打一个唯一的 :sha-<commit> 标签。
          # 否则 deployment 用 :latest + imagePullPolicy:IfNotPresent 时，节点会缓存旧镜像层，
          # `kubectl rollout restart` 只重启 Pod 不重新拉取，导致新代码永远不上线（本次 404 的根因）。
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_REPO }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_REPO }}:sha-${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 4. 通过 SSH 登录服务器并通知 K3s 重启 Pod
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. 用本次 commit 的 SHA 标签强制更新 deployment 的 image 字段。
            #    仅 `rollout restart` 不够：若 deployment 用 :latest + IfNotPresent，
            #    节点会缓存旧镜像层，重启不重新拉取，新代码永不上线。
            #    改成唯一的 :sha-<commit> 标签后 image 字段变化，K8s 必拉新镜像。
            CUR=$(kubectl get deployment zentrix-lab -o jsonpath='{.spec.template.spec.containers[0].image}')
            NEW=$(echo "$CUR" | sed "s#:.*#:sha-${{ github.sha }}#")
            kubectl set image deployment zentrix-lab "*=$NEW"

            # 2. 检查状态
            kubectl rollout status deployment zentrix-lab --timeout=5m
